<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Engine - Tahap 2 (Patched)</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
            background-color: #f4f4f9;
        }
        canvas {
            background-color: white;
            border: 2px solid #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button#stopBtn { background-color: #dc3545; }
        button#stopBtn:hover { background-color: #a71d2a; }
        button#resetBtn { background-color: #6c757d; }
        button#resetBtn:hover { background-color: #5a6268; }
    </style>
</head>
<body>

    <canvas id="simCanvas" width="800" height="200"></canvas>

    <div class="controls">
        <button id="startBtn">Start</button>
        <button id="stopBtn">Stop</button>
        <button id="resetBtn">Reset</button>
    </div>

    <script>
        // ==========================================
        // A. PURE PHYSICS ENGINE
        // ==========================================
        function calculate_physics(m, F, mu, v, x, dt = 0.016) {
            if (m <= 0) throw new Error("Massa harus lebih besar dari 0");
            
            const g = 9.8;
            const F_friction_max = mu * m * g;
            
            let F_friction = 0;
            if (Math.abs(v) > 0.001) {
                F_friction = -F_friction_max * (v > 0 ? 1 : -1);
            } else {
                F_friction = -F_friction_max * (F > 0 ? 1 : -1);
            }

            let F_net = 0, a = 0;
            if (Math.abs(F) <= F_friction_max && Math.abs(v) <= 0.01) {
                F_friction = -F; 
                F_net = 0.0;
                a = 0.0;
                v = 0.0;
            } else {
                F_net = F + F_friction;
                a = F_net / m;
                let v_next = v + a * dt;
                
                if (F === 0 && (v * v_next) <= 0) {
                    v = 0.0;
                    a = 0.0;
                } else {
                    v = v_next;
                }
            }

            if (Math.abs(v) < 1e-5) v = 0.0;
            
            x = x + v * dt;
            let Ek = 0.5 * m * (v ** 2);
            
            return { F_net, F_friction, a, v, x, Ek };
        }

        // ==========================================
        // B. STATE VARIABEL
        // ==========================================
        const M_DEFAULT = 10;
        const F_DEFAULT = 60; 
        const MU_DEFAULT = 0.3;
        
        let m = M_DEFAULT;
        let F = F_DEFAULT;
        let mu = MU_DEFAULT;
        let v = 0;
        let x = 0; 

        const scale = 50; 
        const dt = 0.016; 
        let isRunning = false;
        let animationFrameId = null;

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const ballRadius = 20;
        const groundY = canvas.height / 2 + ballRadius; 
        const startX_pixel = 50; 

        // ==========================================
        // C. RENDERING LOOP
        // ==========================================
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Lantai
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = "#555";
            ctx.lineWidth = 4;
            ctx.stroke();

            // Mapping & Clamping Posisi
            let screenX = startX_pixel + (x * scale);
            
            // FIX: Batasi agar bola tidak keluar canvas di sisi kanan
            if (screenX > canvas.width - ballRadius) {
                screenX = canvas.width - ballRadius;
            }

            // FIX: Indikator visual saat berhenti
            let isStopped = (v === 0);

            // Gambar Bola
            ctx.beginPath();
            ctx.arc(screenX, groundY - ballRadius, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = isStopped ? "#4caf50" : "#ff5722"; // Hijau jika diam, Oranye jika bergerak
            ctx.fill();
            ctx.strokeStyle = "#222";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function update() {
            if (!isRunning) return;

            let state = calculate_physics(m, F, mu, v, x, dt);
            
            v = state.v;
            x = state.x;

            drawScene();

            animationFrameId = requestAnimationFrame(update);
        }

        // ==========================================
        // D. KONTROL BUTTON
        // ==========================================
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                update();
            }
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            // Kita ubah F menjadi 0 saat di-stop untuk mensimulasikan gaya dilepas
            // Ini memicu gesekan untuk menghentikan bola secara alami
            F = 0; 
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            isRunning = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            m = M_DEFAULT;
            F = F_DEFAULT;
            mu = MU_DEFAULT;
            v = 0;
            x = 0;
            
            drawScene();
        });

        drawScene();
    </script>
</body>
</html>
